# WebSocket 升级:终端(/api/terminal)是 WS,nginx 默认不转发 Upgrade 头,握手会退化成
# 普通 GET 打到 backend 的 websocket 路由 → 404。按 $http_upgrade 取值:WS 请求 →
# Connection: upgrade;普通请求(含 SSE)→ 空(不设 Connection,保持 keep-alive 不受影响)。
# map 在 http 上下文(conf.d 片段被 include 进 http 块),故置于 server 块外。
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      '';
}

# SPA 静态 + /api 反代(与 vite 代理同语义:去掉 /api 前缀打到 backend)。
server {
  listen 443 ssl;
  server_name app.sophclaw.icu;
  # Let's Encrypt 证书(certbot DNS-01 在宿主签发/自动续期,经 compose 只读挂载进容器)。
  ssl_certificate     /etc/letsencrypt/live/app.sophclaw.icu/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.sophclaw.icu/privkey.pem;
  # 用 http:// 打到这个 HTTPS 端口(直连 IP、或老入口转来的明文请求)→ 自动跳到 https 域名,
  # 而不是甩 400(nginx 把这种情况内部记为 497)。$request_uri 保留原路径;302 临时跳、不被缓存。
  error_page 497 =302 https://app.sophclaw.icu:18080$request_uri;
  client_max_body_size 100m;  # 与 backend file_upload_max_bytes 对齐

  # /api/auth/refresh → backend /auth/refresh;proxy_pass 带尾斜杠 = 去前缀
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;
    # WebSocket 升级(终端 /api/terminal):非 WS 请求 $connection_upgrade 为空、无副作用
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # SSE(回合流)必需:不缓冲、长读超时
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;  # SPA 路由回退
  }
}
