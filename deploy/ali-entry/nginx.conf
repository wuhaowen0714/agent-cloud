# ali-ecs 入口容器:保住老地址 http://47.94.140.245:8080/,把用户送到 st-e 主站。
#
# 模式 = 302 重定向(当前启用):流量不过境 ali。实测 ali 出向仅 ~3.5Mbps、st-e ~168Mbps
# (2026-06-13),反代会把一切封顶在小水管上;重定向后浏览器直连 st-e 大带宽。
# 用 302(非 301):浏览器不持久缓存,改向/回滚即时生效。
server {
  listen 80;
  location / {
    return 302 http://106.75.235.242:18080$request_uri;
  }
}

