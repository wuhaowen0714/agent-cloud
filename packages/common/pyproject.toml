[project]
name = "agent-cloud-common"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = ["grpcio", "protobuf"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_cloud_common", "src/agent_cloud"]

[dependency-groups]
dev = ["grpcio-tools"]
