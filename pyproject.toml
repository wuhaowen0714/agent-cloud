[project]
name = "agent-cloud"
version = "0.0.0"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["packages/*", "services/*"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Generated protobuf/grpc stubs are regenerated by scripts/gen_protos.sh and are
# not hand-edited; linting them is pointless and the fixes would be clobbered.
extend-exclude = ["*_pb2.py", "*_pb2_grpc.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection markers are designed to be used as argument
# defaults; exempt them from B008 (function call in argument default).
extend-immutable-calls = ["fastapi.Depends", "fastapi.Form", "fastapi.File"]
