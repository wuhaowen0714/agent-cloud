syntax = "proto3";

package agent_cloud.v1;

// 终端双向流消息(TerminalClientMsg/TerminalServerMsg)定义在 sandbox.proto;
// worker 的 Terminal 是到 sandbox 的纯透传桥,复用同 package 的同名消息。
import "agent_cloud/v1/sandbox.proto";

// worker:跑一个回合(后端→worker)。一元 RunTurn + 流式 RunTurnStream。
service Worker {
  rpc RunTurn(RunTurnRequest) returns (RunTurnResponse);
  rpc RunTurnStream(RunTurnRequest) returns (stream TurnEvent);
  rpc Summarize(SummarizeRequest) returns (SummarizeResponse);
  rpc ExtractMemory(ExtractMemoryRequest) returns (ExtractMemoryResponse);
  rpc GenerateTitle(GenerateTitleRequest) returns (GenerateTitleResponse);
  // 交互式终端透传桥(backend→worker→sandbox)。sandbox 连接信息走 gRPC
  // metadata(x-sandbox-endpoint / x-sandbox-token),不进消息体。
  rpc Terminal(stream TerminalClientMsg) returns (stream TerminalServerMsg);
}

// 会话标题:基于首条用户提问起 ≤16 字短名(backend 回合后异步调用)。
message GenerateTitleRequest {
  Agent agent = 1;
  string user_message = 2;
}
message GenerateTitleResponse {
  string title = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
}

message ToolCall {
  string id = 1;
  string name = 2;
  string arguments_json = 3;
}

message ToolResult {
  string call_id = 1;
  string content = 2;
  bool is_error = 3;
}

message Msg {
  string role = 1;  // user | assistant | tool
  string text = 2;
  repeated ToolCall tool_calls = 3;
  repeated ToolResult tool_results = 4;
}

message Agent {
  string model = 1;
  string provider = 2;
  reserved 3;  // 原 thinking_level(从未接线 LLM 调用),已删
  repeated string enabled_tools = 4;
  string key_ref = 5;
  string api_key = 6;   // 后端按 key_ref 解密填入;worker 用之造 client。仅 BE→Worker,绝不进 sandbox。
  string base_url = 7;
}

message Doc {
  string scope = 1;
  string type = 2;
  string content = 3;
}

message Mem {
  string scope = 1;
  string content = 2;
}

message Skill {
  string name = 1;
  string description = 2;
  string location = 3;
}

message RunTurnRequest {
  string session_id = 1;
  string user_id = 2;
  Agent agent = 3;
  repeated Doc documents = 4;
  repeated Mem memory = 5;
  repeated Skill skills = 6;
  repeated Msg messages = 7;   // 历史
  string user_message = 8;
  string sandbox_endpoint = 9;
  string work_subdir = 10;
  string history_summary = 11;  // 此前历史的摘要,worker 拼进 system
  string sandbox_token = 12;    // 沙箱 gRPC 鉴权 token(backend 注入;空=不校验)
  bool is_scheduled_run = 13;   // true=本回合由定时任务触发;worker 据此不暴露 schedule_task(防自排期)
  // 本回合要发给模型的图片(工作区相对路径)。backend 每轮算"活跃图片"填入(本轮新上传 or
  // 最近活跃图);worker 调 LLM 前经沙箱读成 data_uri 注入 content。详见 spec: image-understanding。
  repeated string turn_images = 14;
}

message RunTurnResponse {
  repeated Msg new_messages = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
  string stop_reason = 4;
  int64 context_tokens = 5;  // 最后一次 LLM 调用的 input_tokens(真实上下文大小)
}

message TextDelta { string text = 1; }
message ThinkingDelta { string text = 1; }
message ToolCallStarted {
  string call_id = 1;
  string name = 2;
  string arguments_json = 3;
}
// 参数生成中的节流进度(worker 在 LLM 分片累积时发;不含参数内容)。
message ToolCallProgress {
  string call_id = 1;
  string name = 2;
  int64 args_chars = 3;
  int64 lines = 4;
  string path_hint = 5;
}
message ToolResultEvent {
  string call_id = 1;
  string content = 2;
  bool is_error = 3;
}
message TurnDone {
  repeated Msg new_messages = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
  string stop_reason = 4;
  int64 context_tokens = 5;  // 最后一次 LLM 调用的 input_tokens(真实上下文大小)
}
message TurnEvent {
  oneof event {
    TextDelta text_delta = 1;
    ThinkingDelta thinking_delta = 2;
    ToolCallStarted tool_call_started = 3;
    ToolResultEvent tool_result = 4;
    TurnDone turn_done = 5;
    ToolCallProgress tool_call_progress = 6;
  }
}

message SummarizeRequest {
  Agent agent = 1;
  string prior_summary = 2;
  repeated Msg messages = 3;
}
message SummarizeResponse {
  string summary = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
}

// 记忆提炼(后端→worker;LLM key 留 worker)。双块对账:user(跨 agent 共享)与
// agent(单 agent 专属)各自输出 changed + 整块,错层事实归位。soft_max_chars 是软上限,
// 只引导 LLM,后端不硬截断。
message ExtractMemoryRequest {
  Agent agent = 1;
  string user_memory = 2;
  string agent_memory = 3;
  repeated Msg messages = 4;
  int32 soft_max_chars = 5;
}
message ExtractMemoryResponse {
  string user_memory = 1;
  string agent_memory = 2;
  bool user_changed = 3;
  bool agent_changed = 4;
  int64 input_tokens = 5;
  int64 output_tokens = 6;
}
